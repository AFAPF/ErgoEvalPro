<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ErgoEval Numérique – Bilan numérique complet</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f4f7fc; --surface: #ffffff; --text: #1e293b;
      --primary: #3b82f6; --primary-hover: #2563eb;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --border: #e2e8f0; --radius: 12px;
      --shadow: 0 8px 24px rgba(0,0,0,0.06);
      --font-size: 16px; --font-family: 'Inter', system-ui, sans-serif;
    }
    body.dark {
      --bg: #0f172a; --surface: #1e293b; --text: #e2e8f0;
      --primary: #60a5fa; --primary-hover: #3b82f6;
      --success: #34d399; --warning: #fbbf24; --danger: #f87171;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family); font-size: var(--font-size);
      background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    .app-shell { max-width: 960px; margin: 0 auto; padding: 1rem; }
    .top-nav {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
      background: var(--surface); padding: 0.75rem 1rem; border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .logo { font-weight: 700; font-size: 1.25rem; color: var(--primary); margin-right: auto; }
    .btn {
      background: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px;
      cursor: pointer; font-weight: 500; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.3rem;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .btn.secondary { background: #64748b; }
    .btn.success { background: var(--success); }
    .btn.warning { background: var(--warning); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .card {
      background: var(--surface); border-radius: var(--radius); padding: 2rem; margin-bottom: 1rem;
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    input, select, textarea {
      padding: 0.6rem; border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); color: var(--text); font-size: 0.95rem; font-family: var(--font-family);
    }
    .game-area {
      position: relative; width: 100%; height: 400px; background: #f8fafc;
      border: 2px solid var(--border); border-radius: var(--radius); overflow: hidden; margin: 1rem 0;
    }
    .target {
      position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ff6b6b, #c92a2a);
      box-shadow: 0 0 12px rgba(255,0,0,0.5); transition: transform 0.1s;
    }
    .target.clicked { background: radial-gradient(circle at 30% 30%, #69db7c, #2b8a3e); }
    .timer { font-size: 1.4rem; font-weight: 600; margin: 0.5rem 0; background: var(--bg); padding: 0.3rem 0.8rem; border-radius: 6px; display: inline-block; }
    .grid-cell {
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; border-radius: 8px; background: var(--surface); border: 1px solid var(--border);
      user-select: none; transition: background 0.2s;
    }
    .grid-cell.selected { background: #d3f9d8; border-color: var(--success); box-shadow: 0 0 0 2px var(--success); }
    .dropzone {
      border: 2px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center;
      color: #94a3b8; font-size: 0.9rem; background: rgba(0,0,0,0.02); min-width: 80px; min-height: 80px;
    }
    .construction-zone {
      position: relative; width: 100%; height: 350px; background: #f9fafb;
      border: 2px dashed var(--border); border-radius: var(--radius); overflow: hidden; touch-action: none;
    }
    .palette-item {
      width: 50px; height: 50px; border-radius: 8px; cursor: grab; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: transform 0.2s;
    }
    .shape-on-zone { position: absolute; cursor: move; border: 1px solid rgba(0,0,0,0.2); touch-action: none; }
    .stat-container { position: relative; height: 300px; margin: 1rem 0; }
    canvas { touch-action: none; display: block; }
    .score-badge {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-weight: bold;
      background: var(--primary); color: white; font-size: 0.8rem;
    }
    .category-card {
      background: var(--surface); border-radius: var(--radius); padding: 1rem; margin: 0.5rem;
      border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .emoji-btn { font-size: 2rem; background: none; border: 2px solid transparent; border-radius: 8px; padding: 0.3rem 0.6rem; cursor: pointer; }
    .emoji-btn:hover, .emoji-btn.selected { border-color: var(--primary); background: var(--bg); }
    .mem-item {
      cursor: pointer; padding: 0.5rem; border: 2px solid transparent; border-radius: 8px; user-select: none;
    }
    .mem-item.selected { border-color: var(--primary); background: var(--primary-light); }
  </style>
</head>
<body class="light">
  <div class="app-shell" id="app"></div>
  <script>
    // ========== APP CORE ==========
    const App = {
      currentUser: null,
      settings: { theme:'light', fontSize:'normal', fontFamily:'Inter', soundEnabled:true },
      audioCtx: null,
      getUsers() { return JSON.parse(localStorage.getItem('ergoeval_users')||'[]'); },
      saveUsers(u) { localStorage.setItem('ergoeval_users', JSON.stringify(u)); },
      getSessions(uid) { return JSON.parse(localStorage.getItem('ergoeval_sessions')||'[]').filter(s=>s.userId==uid); },
      saveSession(s) {
        const all = JSON.parse(localStorage.getItem('ergoeval_sessions')||'[]');
        s.id = Date.now().toString(); all.push(s);
        localStorage.setItem('ergoeval_sessions', JSON.stringify(all));
      },
      applySettings() {
        document.body.className = this.settings.theme;
        document.documentElement.style.setProperty('--font-family', this.settings.fontFamily);
        const sizes = { normal:'16px', large:'20px', xlarge:'24px' };
        document.documentElement.style.setProperty('--font-size', sizes[this.settings.fontSize]||'16px');
      },
      loadSettings() {
        Object.assign(this.settings, JSON.parse(localStorage.getItem('ergoeval_settings')||'{}'));
        this.applySettings();
      },
      saveSettings() {
        localStorage.setItem('ergoeval_settings', JSON.stringify(this.settings));
        this.applySettings();
      },
      beep(freq, dur) {
        if(!this.settings.soundEnabled) return;
        try {
          if(!this.audioCtx) this.audioCtx = new (window.AudioContext||window.webkitAudioContext)();
          const o = this.audioCtx.createOscillator(), g = this.audioCtx.createGain();
          o.type='sine'; o.frequency.value=freq; g.gain.value=0.08;
          o.connect(g); g.connect(this.audioCtx.destination);
          o.start(); setTimeout(()=>o.stop(), dur);
        } catch(e){}
      },
      render(html) { document.getElementById('app').innerHTML = html; this.applySettings(); }
    };

    // ========== NAVIGATION ==========
    function showLogin() {
      const users = App.getUsers();
      App.render(`
        <div class="top-nav"><span class="logo">🧠 ErgoEval Pro</span><span>Bilan numérique pour enfants Dys</span></div>
        <div class="card">
          <h2>Profil</h2>
          <select id="userSelect" style="width:100%; margin-bottom:1rem;"><option value="">-- Choisir un profil --</option>
            ${users.map(u=>`<option value="${u.id}">${u.nom} (${u.age} ans, ${u.groupe})</option>`).join('')}
          </select>
          <button class="btn" onclick="selectUser()">📂 Ouvrir</button>
          <hr style="margin:1rem 0"><h3>Nouveau profil</h3>
          <div class="grid" style="grid-template-columns:1fr auto auto auto;">
            <input id="newNom" placeholder="Nom complet">
            <input type="number" id="newAge" placeholder="Âge" min="3" max="18" value="8">
            <select id="newGroupe"><option value="dyslexie">Dyslexie</option><option value="dyspraxie">Dyspraxie</option><option value="dyscalculie">Dyscalculie</option><option value="mixte">Mixte</option></select>
            <button class="btn" onclick="createUser()">➕ Créer</button>
          </div>
        </div>
      `);
    }

    function showDashboard() {
      if(!App.currentUser) return showLogin();
      const sessions = App.getSessions(App.currentUser.id);
      const hist = sessions.length ? sessions.map(s=>`<div style="padding:0.3rem; background:var(--bg); border-radius:6px; margin:0.2rem 0">${s.epreuve} (${s.mode}) – ${new Date(s.date).toLocaleDateString()} – ${JSON.stringify(s.score)}${s.sentiment?' - '+s.sentiment:''}</div>`).join('') : '<em>Aucune épreuve</em>';
      App.render(`
        <div class="top-nav">
          <span class="logo">🧠 ErgoEval Pro</span>
          <button class="btn" onclick="showEpreuves()">🧪 Épreuves</button>
          <button class="btn" onclick="showRapport()">📊 Rapport détaillé</button>
          <button class="btn secondary" onclick="openSettings()">⚙️ Paramètres</button>
          <button class="btn secondary" onclick="showInfo()">ℹ️ Notation</button>
          <button class="btn secondary" onclick="logout()">↩️ Déconnexion</button>
        </div>
        <div class="card">
          <h2>👤 ${App.currentUser.nom} (${App.currentUser.age} ans, ${App.currentUser.groupe})</h2>
          <h3>Historique</h3><div style="max-height:400px; overflow-y:auto;">${hist}</div>
        </div>
      `);
    }

    function showEpreuves() {
      App.render(`
        <div class="top-nav"><span class="logo">🧠 ErgoEval Pro</span><button class="btn" onclick="showDashboard()">🏠 Accueil</button></div>
        <div class="card"><h2>📋 Épreuves</h2>
          <div class="grid">
            <button class="btn" onclick="Epreuves.Pointage.chooseMode()">🎯 Pointage</button>
            <button class="btn" onclick="Epreuves.GlisserDeposer.chooseMode()">🖐️ Glisser-déposer</button>
            <button class="btn" onclick="Epreuves.DoubleClic.chooseMode()">🖱️ Double-clic</button>
            <button class="btn" onclick="Epreuves.Dictee.chooseMode()">🔢 Dictée</button>
            <button class="btn" onclick="Epreuves.CalculMental.chooseMode()">🧮 Calcul</button>
            <button class="btn" onclick="Epreuves.Problemes.chooseMode()">📝 Problèmes</button>
            <button class="btn" onclick="Epreuves.CopieTexte.chooseMode()">✍️ Copie</button>
            <button class="btn" onclick="Epreuves.Barrage.chooseMode()">🔍 Barrage</button>
            <button class="btn" onclick="Epreuves.Assemblage.chooseMode()">🧩 Assemblage</button>
            <button class="btn" onclick="Epreuves.TracePrecision.chooseMode()">✏️ Tracé</button>
            <button class="btn" onclick="Epreuves.PointsARelier.chooseMode()">🔗 Points</button>
            <button class="btn" onclick="Epreuves.PerceptionVisuelle.chooseMode()">👁️ Perception</button>
            <button class="btn" onclick="Epreuves.TrailMaking.chooseMode()">🔀 Trail</button>
            <button class="btn" onclick="Epreuves.Memorisation.chooseMode()">🧠 Mémoire</button>
          </div>
        </div>
      `);
    }

    function showInfo() {
      App.render(`
        <div class="top-nav"><span class="logo">ℹ️ Barème de notation</span><button class="btn secondary" onclick="showDashboard()">Retour</button></div>
        <div class="card">
          <h2>Comment sont calculées les notes sur 10 ?</h2>
          <ul style="line-height:2;">
            <li><b>Pointage</b> : 70% précision + 30% vitesse (10 - temps/3)</li>
            <li><b>Glisser-déposer</b> : 10 - temps/5 - erreurs×2</li>
            <li><b>Double-clic</b> : 10 - temps/3</li>
            <li><b>Dictée, Calcul, Problèmes, Perception</b> : bonnes réponses / total × 10</li>
            <li><b>Copie texte</b> : (mots/min / 20 × 10) × précision (1 - erreurs/10)</li>
            <li><b>Barrage</b> : (trouvées/total×10) - fausses×1.5</li>
            <li><b>Assemblage</b> : 10 - temps/15 - |3 - formes|×2</li>
            <li><b>Tracé</b> : 10 - temps/25 - sorties×1.5</li>
            <li><b>Points à relier</b> : 10 - temps/8 - erreurs×2</li>
            <li><b>Trail Making</b> : 10 - temps/15 - erreurs×2</li>
            <li><b>Mémoire</b> : (correct - erreurs) / total × 10</li>
          </ul>
          <p style="margin-top:1rem;"><b>Interprétation :</b> ≥ 7 = facilité, ≥ 4 = difficulté modérée, &lt; 4 = difficulté importante.</p>
        </div>
      `);
    }

    function selectUser() {
      const id = document.getElementById('userSelect').value;
      if(!id) return alert('Choisissez un profil.');
      App.currentUser = App.getUsers().find(u=>u.id==id);
      localStorage.setItem('ergoeval_lastUser', App.currentUser.id);
      showDashboard();
    }
    function createUser() {
      const nom = document.getElementById('newNom').value.trim();
      const age = parseInt(document.getElementById('newAge').value);
      const groupe = document.getElementById('newGroupe').value;
      if(!nom || !age) return alert('Nom et âge requis.');
      const users = App.getUsers();
      const newUser = { id: Date.now().toString(), nom, age, groupe };
      users.push(newUser); App.saveUsers(users);
      App.currentUser = newUser;
      localStorage.setItem('ergoeval_lastUser', newUser.id);
      showDashboard();
    }
    function logout() { App.currentUser = null; localStorage.removeItem('ergoeval_lastUser'); showLogin(); }
    function openSettings() {
      const s = App.settings;
      App.render(`
        <div class="top-nav"><span class="logo">Paramètres</span><button class="btn secondary" onclick="showDashboard()">Retour</button></div>
        <div class="card">
          <label>Thème : <select onchange="updateSetting('theme',this.value)">
            <option value="light" ${s.theme=='light'?'selected':''}>Clair</option>
            <option value="dark" ${s.theme=='dark'?'selected':''}>Sombre</option>
          </select></label>
          <label>Police : <select onchange="updateSetting('fontFamily',this.value)">
            <option value="Inter" ${s.fontFamily=='Inter'?'selected':''}>Inter</option>
            <option value="'OpenDyslexic', sans-serif" ${s.fontFamily.includes('OpenDyslexic')?'selected':''}>OpenDyslexic</option>
          </select></label>
          <label>Taille : <select onchange="updateSetting('fontSize',this.value)">
            <option value="normal" ${s.fontSize=='normal'?'selected':''}>Normal</option>
            <option value="large" ${s.fontSize=='large'?'selected':''}>Grand</option>
            <option value="xlarge" ${s.fontSize=='xlarge'?'selected':''}>Très grand</option>
          </select></label>
          <label>Sons : <input type="checkbox" ${s.soundEnabled?'checked':''} onchange="updateSetting('soundEnabled',this.checked)"></label>
        </div>
      `);
    }
    function updateSetting(k,v) { if(k==='soundEnabled') v = v===true||v==='true'; App.settings[k]=v; App.saveSettings(); }

    // ========== CATÉGORIES ET SCORES (révisés) ==========
    const CATEGORIES = {
      'Logique': ['Trail Making', 'Barrage visuel', 'Points à relier'],
      'Calcul': ['Calcul mental', 'Problèmes', 'Dictée de nombres'],
      'Frappe clavier': ['Copie de texte', 'Double-clic / Clic droit', 'Glisser-déposer'],
      'Visuo-spatiale': ['Pointage de cibles', 'Assemblage de formes', 'Tracé de précision', 'Perception visuelle'],
      'Mémoire': ['Mémorisation visuelle']
    };

    function normaliserScore(epreuve, score) {
      if(!score) return 0;
      switch(epreuve) {
        case 'Pointage de cibles': return Math.min(10, ((score.precision||0)/10)*0.7 + Math.max(0,10-(parseFloat(score.totalSec)||60)/3)*0.3);
        case 'Glisser-déposer': return Math.max(0, 10 - (parseFloat(score.temps)||30)/5 - (score.erreurs||0)*2);
        case 'Double-clic / Clic droit': return Math.max(0, 10 - (parseFloat(score.temps)||20)/3);
        case 'Dictée de nombres': return ((score.correct||0) / (score.total||10)) * 10;
        case 'Calcul mental': return ((score.correct||0) / (score.total||8)) * 10;
        case 'Problèmes': return ((score.correct||0) / (score.total||4)) * 10;
        case 'Copie de texte': {
          const wpm = score.wpm || 0; const erreurs = score.erreurs || 0;
          const precision = Math.max(0, 1 - erreurs/10);
          return Math.min(10, (wpm/20)*10*precision);
        }
        case 'Barrage visuel': return Math.max(0, ((score.trouvees||0)/(score.cibles||25))*10 - (score.fausses||0)*1.5);
        case 'Assemblage de formes': return Math.max(0, 10 - (parseFloat(score.temps)||30)/15 - Math.abs(3-(score.formes||0))*2);
        case 'Tracé de précision': return Math.max(0, 10 - (parseFloat(score.temps)||30)/25 - (score.sorties||0)*1.5);
        case 'Points à relier': return Math.max(0, 10 - (parseFloat(score.temps)||30)/8 - (score.erreurs||0)*2);
        case 'Perception visuelle': return ((score.correct||0) / (score.total||10)) * 10;
        case 'Trail Making': return Math.max(0, 10 - (parseFloat(score.temps)||30)/15 - (score.erreurs||0)*2);
        case 'Mémorisation visuelle': {
          const correct = score.correct || 0; const errors = score.errors || 0; const total = score.total || 6;
          return Math.max(0, ((correct - errors) / total) * 10);
        }
        default: return 0;
      }
    }

    function calculerNotes(sessions) {
      const notesParEpreuve = {};
      sessions.forEach(s => {
        if(!notesParEpreuve[s.epreuve]) notesParEpreuve[s.epreuve] = {};
        if(!notesParEpreuve[s.epreuve][s.mode]) notesParEpreuve[s.epreuve][s.mode] = [];
        notesParEpreuve[s.epreuve][s.mode].push(normaliserScore(s.epreuve, s.score));
      });
      const moyenneEpreuve = {};
      for(const [ep, modes] of Object.entries(notesParEpreuve)) {
        const allNotes = [];
        for(const notes of Object.values(modes)) allNotes.push(...notes);
        if(allNotes.length) moyenneEpreuve[ep] = allNotes.reduce((a,b)=>a+b,0)/allNotes.length;
      }
      const categories = {};
      for(const [cat, epreuves] of Object.entries(CATEGORIES)) {
        let somme = 0, nb = 0;
        epreuves.forEach(ep => { if(moyenneEpreuve[ep]!==undefined) { somme += moyenneEpreuve[ep]; nb++; } });
        categories[cat] = nb > 0 ? somme / nb : 0;
      }
      return { parEpreuve: moyenneEpreuve, categories, notesParEpreuve };
    }

    function showRapport() {
      if(!App.currentUser) return showLogin();
      const sessions = App.getSessions(App.currentUser.id);
      if(!sessions.length) {
        App.render(`<div class="card"><h2>📊 Rapport</h2><p>Aucune épreuve réalisée.</p><button class="btn" onclick="showDashboard()">Retour</button></div>`);
        return;
      }
      const { parEpreuve, categories, notesParEpreuve } = calculerNotes(sessions);
      let htmlEpreuves = '';
      for(const [ep, note] of Object.entries(parEpreuve)) {
        const color = note >= 7 ? 'var(--success)' : note >= 4 ? 'var(--warning)' : 'var(--danger)';
        htmlEpreuves += `<div style="display:flex; justify-content:space-between; margin:0.3rem 0;"><span>${ep}</span><span class="score-badge" style="background:${color}">${note.toFixed(1)}/10</span></div>`;
      }
      let htmlCategories = '';
      for(const [cat, note] of Object.entries(categories)) {
        const color = note >= 7 ? 'var(--success)' : note >= 4 ? 'var(--warning)' : 'var(--danger)';
        const epreuvesCat = CATEGORIES[cat].join(', ');
        htmlCategories += `<div class="category-card" style="border-left:4px solid ${color}"><strong>${cat}</strong> : ${note.toFixed(1)}/10<div>Épreuves : ${epreuvesCat}</div><p>${note>=7?'✅ Facilité':note>=4?'⚠️ Modéré':'❌ Difficulté'}</p></div>`;
      }
      let recommandations = '';
      if(categories['Frappe clavier']<4) recommandations += '<li>Clavier adapté ou dictée vocale.</li>';
      if(categories['Visuo-spatiale']<4) recommandations += '<li>Écran tactile, éviter la souris.</li>';
      if(categories['Calcul']<4) recommandations += '<li>Calculatrice ou logiciel d’aide.</li>';
      if(categories['Logique']<4) recommandations += '<li>Supports visuels structurés.</li>';
      if(categories['Mémoire']<4) recommandations += '<li>Aide-mémoire, fractionner les consignes.</li>';
      if(!recommandations) recommandations = '<li>Aucune difficulté majeure détectée.</li>';

      let comparaisonHtml = '';
      for(const [ep, modes] of Object.entries(notesParEpreuve)) {
        if(modes.numerique && modes.papier) {
          const numAvg = modes.numerique.reduce((a,b)=>a+b,0)/modes.numerique.length;
          const papAvg = modes.papier.reduce((a,b)=>a+b,0)/modes.papier.length;
          const gain = numAvg - papAvg;
          comparaisonHtml += `<div>${ep} : Num. ${numAvg.toFixed(1)} / Pap. ${papAvg.toFixed(1)} → ${gain>0?'+'+gain.toFixed(1):gain.toFixed(1)}</div>`;
        }
      }

      let ressentiHtml = sessions.filter(s=>s.sentiment).map(s=>`${s.epreuve}: ${s.sentiment}`).join('<br>') || 'Aucun retour.';

      App.render(`
        <div class="top-nav"><span class="logo">Rapport détaillé</span><button class="btn secondary" onclick="showDashboard()">Retour</button></div>
        <div class="card">
          <h2>📊 Notes par épreuve</h2>${htmlEpreuves}
          <hr><h2>📂 Catégories</h2><div class="grid" style="grid-template-columns:1fr 1fr;">${htmlCategories}</div>
          <div class="stat-container"><canvas id="radarChart"></canvas></div>
          <hr><h2>💡 Préconisations</h2><ul>${recommandations}</ul>
          <hr><h2>📈 Comparaison numérique/papier</h2>${comparaisonHtml||'Aucune comparaison.'}
          <hr><h2>😊 Ressenti</h2><p>${ressentiHtml}</p>
        </div>
      `);
      setTimeout(()=>{
        const ctx = document.getElementById('radarChart')?.getContext('2d');
        if(ctx) new Chart(ctx, { type:'radar', data:{ labels:Object.keys(categories), datasets:[{ label:'Score /10', data:Object.values(categories), backgroundColor:'rgba(59,130,246,0.2)', borderColor:'#3b82f6' }] }, options:{ responsive:true, maintainAspectRatio:false, scales:{ r:{ beginAtZero:true, max:10, ticks:{stepSize:2} } } } });
      },100);
    }

    // ========== EPREUVES ==========
    class Epreuve {
      constructor(nom, mode='numerique', isTraining=false) {
        this.nom = nom; this.mode = mode; this.isTraining = isTraining;
        this.session = { userId:App.currentUser.id, date:new Date().toISOString(), epreuve:nom, mode, score:{}, sentiment:null };
        this.startTime = Date.now();
      }
      finish() { if(!this.isTraining) App.saveSession(this.session); }
    }

    function chooseMode(epreuveName, startFn) {
      App.render(`
        <div class="top-nav"><span class="logo">${epreuveName}</span><button class="btn secondary" onclick="showEpreuves()">Retour</button></div>
        <div class="card">
          <h2>${epreuveName}</h2>
          <p>Choisissez un mode :</p>
          <button class="btn" id="startEval">📝 Évaluation</button>
          <button class="btn warning" id="startTrain">🏋️ Entraînement</button>
          <button class="btn secondary" id="startPapier">📄 Saisie papier</button>
        </div>
      `);
      document.getElementById('startEval').addEventListener('click', ()=>startFn('evaluation'));
      document.getElementById('startTrain').addEventListener('click', ()=>startFn('entrainement'));
      document.getElementById('startPapier').addEventListener('click', ()=>showPaperInput(epreuveName));
    }

    function showPaperInput(epreuveName) {
      let formHtml = '';
      switch(epreuveName) {
        case 'Pointage de cibles': formHtml = '<label>Précision (%) <input id="pap1"></label><label>Temps (s) <input id="pap2"></label>'; break;
        case 'Glisser-déposer': formHtml = '<label>Temps (s) <input id="pap1"></label><label>Erreurs <input id="pap2"></label>'; break;
        case 'Double-clic / Clic droit': formHtml = '<label>Temps (s) <input id="pap1"></label>'; break;
        case 'Dictée de nombres': formHtml = '<label>Total <input id="pap1" value="10"></label><label>Correct <input id="pap2"></label>'; break;
        case 'Calcul mental': formHtml = '<label>Total <input id="pap1" value="8"></label><label>Correct <input id="pap2"></label>'; break;
        case 'Problèmes': formHtml = '<label>Total <input id="pap1" value="4"></label><label>Correct <input id="pap2"></label>'; break;
        case 'Copie de texte': formHtml = '<label>Caractères <input id="pap1"></label><label>Erreurs <input id="pap2"></label>'; break;
        case 'Barrage visuel': formHtml = '<label>Cibles <input id="pap1" value="25"></label><label>Trouvées <input id="pap2"></label><label>Fausses <input id="pap3"></label><label>Temps (s) <input id="pap4"></label>'; break;
        case 'Assemblage de formes': formHtml = '<label>Formes <input id="pap1"></label><label>Temps (s) <input id="pap2"></label>'; break;
        case 'Tracé de précision': formHtml = '<label>Temps (s) <input id="pap1"></label><label>Sorties <input id="pap2"></label>'; break;
        case 'Points à relier': formHtml = '<label>Temps (s) <input id="pap1"></label><label>Erreurs <input id="pap2"></label>'; break;
        case 'Perception visuelle': formHtml = '<label>Total <input id="pap1" value="10"></label><label>Correct <input id="pap2"></label>'; break;
        case 'Trail Making': formHtml = '<label>Temps (s) <input id="pap1"></label><label>Erreurs <input id="pap2"></label>'; break;
        case 'Mémorisation visuelle': formHtml = '<label>Correct <input id="pap1"></label><label>Erreurs <input id="pap2"></label>'; break;
      }
      App.render(`
        <div class="top-nav"><span class="logo">Saisie papier - ${epreuveName}</span><button class="btn secondary" onclick="showEpreuves()">Annuler</button></div>
        <div class="card"><h2>📄 ${epreuveName} (papier)</h2>${formHtml}<button class="btn success" id="savePaperBtn">Enregistrer</button></div>
      `);
      document.getElementById('savePaperBtn').addEventListener('click', ()=>{
        const session = new Epreuve(epreuveName, 'papier');
        const v1 = document.getElementById('pap1')?.value, v2 = document.getElementById('pap2')?.value, v3 = document.getElementById('pap3')?.value, v4 = document.getElementById('pap4')?.value;
        switch(epreuveName) {
          case 'Pointage de cibles': session.session.score = { precision:parseFloat(v1)||0, totalSec:parseFloat(v2)||0 }; break;
          case 'Glisser-déposer': session.session.score = { temps:parseFloat(v1)||0, erreurs:parseInt(v2)||0 }; break;
          case 'Double-clic / Clic droit': session.session.score = { temps:parseFloat(v1)||0 }; break;
          case 'Dictée de nombres': session.session.score = { total:parseInt(v1)||10, correct:parseInt(v2)||0 }; break;
          case 'Calcul mental': session.session.score = { total:parseInt(v1)||8, correct:parseInt(v2)||0 }; break;
          case 'Problèmes': session.session.score = { total:parseInt(v1)||4, correct:parseInt(v2)||0 }; break;
          case 'Copie de texte': session.session.score = { caracteres:parseInt(v1)||0, erreurs:parseInt(v2)||0 }; break;
          case 'Barrage visuel': session.session.score = { cibles:parseInt(v1)||25, trouvees:parseInt(v2)||0, fausses:parseInt(v3)||0, temps:parseFloat(v4)||0 }; break;
          case 'Assemblage de formes': session.session.score = { formes:parseInt(v1)||0, temps:parseFloat(v2)||0 }; break;
          case 'Tracé de précision': session.session.score = { temps:parseFloat(v1)||0, sorties:parseInt(v2)||0 }; break;
          case 'Points à relier': session.session.score = { temps:parseFloat(v1)||0, erreurs:parseInt(v2)||0 }; break;
          case 'Perception visuelle': session.session.score = { total:parseInt(v1)||10, correct:parseInt(v2)||0 }; break;
          case 'Trail Making': session.session.score = { temps:parseFloat(v1)||0, erreurs:parseInt(v2)||0 }; break;
          case 'Mémorisation visuelle': session.session.score = { correct:parseInt(v1)||0, errors:parseInt(v2)||0, total:6 }; break;
        }
        session.finish();
        App.render(`<div class="card"><h2>Enregistré</h2><button class="btn" onclick="showEpreuves()">Menu</button></div>`);
      });
    }

    // ========== QUESTIONNAIRE DE RESSENTI ==========
    function askSentiment(session) {
      App.render(`
        <div class="card center">
          <h2>😊 Comment t'es-tu senti(e) ?</h2>
          <div style="display:flex; gap:1rem; justify-content:center; margin:1rem;">
            <div class="emoji-btn" id="sent1">😊</div>
            <div class="emoji-btn" id="sent2">😐</div>
            <div class="emoji-btn" id="sent3">😞</div>
          </div>
          <button class="btn secondary" id="skipSent">Passer</button>
        </div>
      `);
      document.getElementById('sent1').addEventListener('click', ()=>saveSentiment(session, '😊'));
      document.getElementById('sent2').addEventListener('click', ()=>saveSentiment(session, '😐'));
      document.getElementById('sent3').addEventListener('click', ()=>saveSentiment(session, '😞'));
      document.getElementById('skipSent').addEventListener('click', ()=>showEpreuves());
    }
    function saveSentiment(session, sentiment) {
      const all = JSON.parse(localStorage.getItem('ergoeval_sessions')||'[]');
      const idx = all.findIndex(s=>s.id===session.id);
      if(idx!==-1) { all[idx].sentiment = sentiment; localStorage.setItem('ergoeval_sessions', JSON.stringify(all)); }
      showEpreuves();
    }

    // ========== EPREUVES (toutes fonctionnelles et corrigées) ==========
    const Epreuves = {
      Pointage: {
        chooseMode() { chooseMode('Pointage de cibles', Epreuves.Pointage.start); },
        start(mode) {
          if(!App.currentUser) return alert('Profil requis.');
          const isTraining = (mode === 'entrainement');
          const state = { running:false, targetCount:20, current:0, hits:0, misses:0, startTime:0, times:[], sizes:[30,45,60,75], target:null, interval:null };
          const epreuve = new Epreuve('Pointage de cibles', 'numerique', isTraining);
          App.render(`
            <div class="top-nav"><span class="logo">Pointage ${isTraining?'(Entraînement)':''}</span><button class="btn secondary" onclick="showEpreuves()">Menu</button></div>
            <div class="card"><h2>🎯 Pointage de cibles</h2><p>Cliquez sur les cibles rouges aussi vite que possible.</p>
              <div class="timer" id="timer">00:00</div><div class="game-area" id="gameArea"></div>
              <button class="btn" id="startBtn" onclick="Epreuves.Pointage.demarrer()">Démarrer</button>
            </div>
          `);
          const area = document.getElementById('gameArea');
          area.addEventListener('click', (e)=>Epreuves.Pointage.handleClick(e, state));
          area.addEventListener('touchstart', (e)=>{ e.preventDefault(); Epreuves.Pointage.handleClick(e.touches[0], state); }, {passive:false});
          window._ptEpreuve = epreuve; window._ptState = state;
        },
        demarrer() {
          const state = window._ptState;
          state.running = true; state.startTime = Date.now();
          document.getElementById('startBtn').disabled = true;
          this.nextTarget();
          state.interval = setInterval(()=>{
            if(!state.running) return;
            const elapsed = Math.floor((Date.now()-state.startTime)/1000);
            document.getElementById('timer').textContent = `${Math.floor(elapsed/60).toString().padStart(2,'0')}:${(elapsed%60).toString().padStart(2,'0')}`;
          }, 200);
        },
        nextTarget() {
          const state = window._ptState;
          if(state.current >= state.targetCount) { Epreuves.Pointage.terminer(); return; }
          if(state.target) state.target.remove();
          const area = document.getElementById('gameArea');
          const size = state.sizes[Math.floor(Math.random()*state.sizes.length)];
          const rect = area.getBoundingClientRect();
          const x = Math.random()*(rect.width-size-4), y = Math.random()*(rect.height-size-4);
          const t = document.createElement('div'); t.className='target';
          t.style.width=size+'px'; t.style.height=size+'px'; t.style.left=x+'px'; t.style.top=y+'px';
          t.dataset.timeStart = Date.now();
          area.appendChild(t);
          state.target = t;
        },
        handleClick(e, state) {
          if(!state.running || !state.target) return;
          const t = state.target; const rect = t.getBoundingClientRect();
          const cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
          const dist = Math.hypot(e.clientX-cx, e.clientY-cy);
          const hit = dist <= rect.width/2; const now = Date.now();
          state.times.push(now - parseInt(t.dataset.timeStart));
          if(!hit) { state.misses++; App.beep(200,300); t.style.background='radial-gradient(circle, #f59e0b, #d97706)'; t.dataset.timeStart=now; }
          else { state.hits++; t.classList.add('clicked'); App.beep(500,150); state.current++; setTimeout(()=>Epreuves.Pointage.nextTarget(), 300); }
        },
        terminer() {
          const state = window._ptState; state.running=false; clearInterval(state.interval);
          if(state.target) state.target.remove();
          const total = (Date.now()-state.startTime)/1000;
          const prec = state.hits/(state.hits+state.misses)*100 || 0;
          const epreuve = window._ptEpreuve;
          epreuve.session.score = { hits:state.hits, misses:state.misses, precision:Math.round(prec), totalSec:total.toFixed(1) };
          App.render(`<div class="card"><h2>Résultat</h2><p>Cibles: ${state.hits}/${state.targetCount}, Précision: ${prec.toFixed(1)}%, Temps: ${total.toFixed(1)}s</p></div>`);
          if(!epreuve.isTraining) { epreuve.finish(); askSentiment(epreuve.session); }
          else { setTimeout(()=>{ alert('Entraînement terminé !'); showEpreuves(); }, 100); }
        }
      },
      GlisserDeposer: {
        chooseMode() { chooseMode('Glisser-déposer', Epreuves.GlisserDeposer.start); },
        start(mode) {
          if(!App.currentUser) return alert('Profil requis.');
          const isTraining = (mode === 'entrainement');
          const items = ['🟥','🟢','🔺']; const targets = ['Carré','Rond','Triangle'];
          const state = { current:0, errors:0, startTime:Date.now(), interval:null };
          const epreuve = new Epreuve('Glisser-déposer', 'numerique', isTraining);
          App.render(`
            <div class="top-nav"><span class="logo">Glisser-déposer ${isTraining?'(Entraînement)':''}</span><button class="btn secondary" onclick="showEpreuves()">Menu</button></div>
            <div class="card"><h2>🖐️ Glisser-déposer</h2><p>Déposez chaque forme dans la bonne boîte.</p>
              <div class="timer" id="timer">00:00</div>
              <div style="display:flex; justify-content:space-around; margin:1rem 0;">
                <div id="sources" style="display:flex; gap:1rem;"></div>
                <div id="targets" style="display:flex; gap:1rem;"></div>
              </div>
            </div>
          `);
          const srcDiv = document.getElementById('sources'), tgtDiv = document.getElementById('targets');
          items.forEach((shape, i) => {
            const src = document.createElement('div'); src.textContent=shape; src.style.fontSize='3rem'; src.draggable=true;
            src.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', i.toString()));
            srcDiv.appendChild(src);
            const tgt = document.createElement('div'); tgt.className='dropzone'; tgt.textContent=targets[i];
            tgt.addEventListener('dragover', e=>e.preventDefault());
            tgt.addEventListener('drop', e=>{
              e.preventDefault();
              const idx = parseInt(e.dataTransfer.getData('text/plain'));
              if(idx === i) { state.current++; App.beep(600,150); if(state.current===items.length) Epreuves.GlisserDeposer.terminer(); else { src.remove(); tgt.style.background='#d1fae5'; } }
              else { state.errors++; App.beep(200,300); }
            });
            tgtDiv.appendChild(tgt);
          });
          state.interval = setInterval(()=>{
            const elapsed = Math.floor((Date.now()-state.startTime)/1000);
            document.getElementById('timer').textContent = `${Math.floor(elapsed/60).toString().padStart(2,'0')}:${(elapsed%60).toString().padStart(2,'0')}`;
          },200);
          window._gdEpreuve = epreuve; window._gdState = state;
        },
        terminer() {
          clearInterval(window._gdState.interval);
          const total = (Date.now()-window._gdState.startTime)/1000;
          const epreuve = window._gdEpreuve;
          epreuve.session.score = { items:3, temps:total.toFixed(1), erreurs:window._gdState.errors };
          App.render(`<div class="card"><h2>Terminé</h2><p>Temps: ${total.toFixed(1)}s, Erreurs: ${window._gdState.errors}</p></div>`);
          if(!epreuve.isTraining) { epreuve.finish(); askSentiment(epreuve.session); }
          else { setTimeout(()=>{ alert('Entraînement terminé !'); showEpreuves(); }, 100); }
        }
      },
      DoubleClic: {
        chooseMode() { chooseMode('Double-clic / Clic droit', Epreuves.DoubleClic.start); },
        start(mode) {
          if(!App.currentUser) return alert('Profil requis.');
          const isTraining = (mode === 'entrainement');
          const essais = [
            {type:'double', consigne:'Double-cliquez sur le dossier', icon:'📁'},
            {type:'right', consigne:'Faites un clic droit sur l\'étoile', icon:'⭐'},
            {type:'double', consigne:'Double-cliquez sur le livre', icon:'📚'},

          ];
          const state = { essais, current:0, times:[], startTime:Date.now() };
          const epreuve = new Epreuve('Double-clic / Clic droit', 'numerique', isTraining);
          App.render(`
            <div class="top-nav"><span class="logo">Double-clic ${isTraining?'(Entraînement)':''}</span><button class="btn secondary" onclick="showEpreuves()">Menu</button></div>

        afficher() {

          if(essai.type === 'double') {

          } else {

        terminer() {

        chooseMode() { chooseMode('Dictée de nombres', Epreuves.Dictee.start); },
        start(mode) {
          if(!App.currentUser) return alert('Profil requis.');
          const isTraining = (mode === 'entrainement');

          const state = { nombres, current:0, responses:[] };
          const epreuve = new Epreuve('Dictée de nombres', 'numerique', isTraining);
          App.render(`
            <div class="top-nav"><span class="logo">Dictée ${isTraining?'(Entraînement)':''}</span><button class="btn secondary" onclick="showEpreuves()">Menu</button></div>
            <div class="card"><h2>🔢 Dictée de nombres</h2><p>Écoutez et tapez le nombre entendu.</p>
              <div id="dnPlay" style="font-size:2rem; cursor:pointer;" onclick="Epreuves.Dictee.lire()">🔊</div>
              <input id="dnInput" style="width:200px;"><button class="btn" onclick="Epreuves.Dictee.valider()">Valider</button>
              <p id="dnProgress">1/${nombres.length}</p>
            </div>
          `);
          window._dnState = state; window._dnEpreuve = epreuve;
          Epreuves.Dictee.lire();
        },
        lire() {
          const nb = window._dnState.nombres[window._dnState.current];
          if('speechSynthesis' in window) {
            const u = new SpeechSynthesisUtterance(nb); u.lang='fr-FR'; u.rate=0.9; speechSynthesis.speak(u);
          } else { document.getElementById('dnPlay').textContent = nb; }
        },
        valider() {
          const s = window._dnState;
          const val = document.getElementById('dnInput').value.trim();
          const expected = s.nombres[s.current];
          s.responses.push({ expected, given:val, correct:val===expected });
          s.current++;
          if(s.current >= s.nombres.length) { Epreuves.Dictee.terminer(); }
          else { document.getElementById('dnInput').value=''; document.getElementById('dnProgress').textContent=`${s.current+1}/${s.nombres.length}`; Epreuves.Dictee.lire(); }
        },
        terminer() {
          const s = window._dnState;
          const correct = s.responses.filter(r=>r.correct).length;
          const epreuve = window._dnEpreuve;
          epreuve.session.score = { total:s.nombres.length, correct, erreurs:s.nombres.length-correct };
          App.render(`<div class="card"><h2>Résultat</h2><p>Correct: ${correct}/${s.nombres.length}</p></div>`);

          draw();
          const clickHandler = (e) => {
            const rect=canvas.getBoundingClientRect(); const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
            const x=(e.clientX-rect.left)*scaleX, y=(e.clientY-rect.top)*scaleY;
            const exp=state.expected[state.current]; if(!exp) return;
            let clicked=null;
            for(const el of elements){ if(Math.hypot(x-el.x,y-el.y)<22){ clicked=el; break; } }
            if(!clicked) return;
            if(clicked.type===exp.type && clicked.value===exp.value){
              state.current++; App.beep(500,100);
              if(state.current>=state.expected.length){
                canvas.removeEventListener('click', clickHandler);
                const temps=(Date.now()-state.startTime)/1000;
                epreuve.session.score={temps:temps.toFixed(1),erreurs:state.erreurs};
                App.render(`<div class="card"><h2>Terminé</h2><p>Temps: ${temps.toFixed(1)}s</p></div>`);
                if(!epreuve.isTraining){ epreuve.finish(); askSentiment(epreuve.session); }
                else{ setTimeout(()=>{ alert('Entraînement terminé !'); showEpreuves(); }, 100); }
              } else draw();
            } else { state.erreurs++; App.beep(200,200); }
          };
          canvas.addEventListener('click', clickHandler);
        }
      },
      Memorisation: {
        chooseMode() { chooseMode('Mémorisation visuelle', Epreuves.Memorisation.start); },
        start(mode) {
          if(!App.currentUser) return alert('Profil requis.');
          const isTraining = (mode === 'entrainement');
          const animaux = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮'];
          const selection = animaux.sort(()=>Math.random()-0.5).slice(0,6);
          const allItems = [...selection, ...animaux.filter(i=>!selection.includes(i)).slice(0,6)].sort(()=>Math.random()-0.5);
          const state = { selection, allItems, chosen:[], startTime:null };
          const epreuve = new Epreuve('Mémorisation visuelle', 'numerique', isTraining);
          App.render(`
            <div class="top-nav"><span class="logo">Mémoire ${isTraining?'(Entraînement)':''}</span><button class="btn secondary" onclick="showEpreuves()">Menu</button></div>
            <div class="card center">
              <h2>🧠 Mémorisation visuelle</h2>
              <p>Mémorisez ces 6 animaux (ils disparaîtront après 5 secondes) :</p>
              <div style="font-size:3rem; margin:1rem;">${selection.join(' ')}</div>
              <button class="btn" id="startMemBtn">Démarrer</button>
            </div>
          `);
          document.getElementById('startMemBtn').addEventListener('click', ()=>{
            state.startTime = Date.now();
            App.render(`
              <div class="card center">
                <h2>🧠 Mémorisation visuelle</h2>
                <p>Cliquez sur les animaux que vous avez vus :</p>
                <div id="memChoices" style="display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:center; font-size:2.5rem;"></div>
                <button class="btn success" id="validateMem">Valider</button>
              </div>
            `);
            const choicesDiv = document.getElementById('memChoices');
            state.allItems.forEach(item => {
              const div = document.createElement('div');
              div.textContent = item; div.className = 'mem-item';
              div.addEventListener('click', ()=>{
                if(div.classList.contains('selected')) { div.classList.remove('selected'); state.chosen = state.chosen.filter(c=>c!==item); }
                else { div.classList.add('selected'); state.chosen.push(item); }
              });
              choicesDiv.appendChild(div);
            });
            document.getElementById('validateMem').addEventListener('click', ()=>{
              const correct = state.chosen.filter(c=>selection.includes(c)).length;
              const errors = state.chosen.filter(c=>!selection.includes(c)).length;
              epreuve.session.score = { correct, errors, total:6 };
              App.render(`<div class="card"><h2>Résultat</h2><p>Correct: ${correct}/6, Erreurs: ${errors}</p></div>`);
              if(!epreuve.isTraining) { epreuve.finish(); askSentiment(epreuve.session); }
              else { setTimeout(()=>{ alert('Entraînement terminé !'); showEpreuves(); }, 100); }
            });
          });
        }
      }
    };

    function startDragShape(e) {
      e.preventDefault();
      const el = e.target.closest('.shape-on-zone');
      if(!el) return;
      const zone = el.parentElement;
      const rect = zone.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const shiftX = clientX - el.getBoundingClientRect().left;
      const shiftY = clientY - el.getBoundingClientRect().top;
      const move = (ev) => { const cx = ev.touches ? ev.touches[0].clientX : ev.clientX; const cy = ev.touches ? ev.touches[0].clientY : ev.clientY; el.style.left = (cx - rect.left - shiftX) + 'px'; el.style.top = (cy - rect.top - shiftY) + 'px'; };
      const stop = () => { document.removeEventListener('mousemove', move); document.removeEventListener('touchmove', move); document.removeEventListener('mouseup', stop); document.removeEventListener('touchend', stop); };
      document.addEventListener('mousemove', move); document.addEventListener('touchmove', move, {passive:false}); document.addEventListener('mouseup', stop); document.addEventListener('touchend', stop);
    }

    // ========== INITIALISATION ==========
    window.onload = () => {
      App.loadSettings();
      const last = localStorage.getItem('ergoeval_lastUser');
      if(last) { const user = App.getUsers().find(u=>u.id===last); if(user) { App.currentUser = user; showDashboard(); return; } }
      showLogin();
    };

    window.showDashboard = showDashboard;
    window.showEpreuves = showEpreuves;
    window.showLogin = showLogin;
    window.selectUser = selectUser;
    window.createUser = createUser;
    window.logout = logout;
    window.openSettings = openSettings;
    window.updateSetting = updateSetting;
    window.showRapport = showRapport;
    window.showInfo = showInfo;
    window.Epreuves = Epreuves;
    window.askSentiment = askSentiment;
    window.saveSentiment = saveSentiment;
    window.showPaperInput = showPaperInput;
  </script>
</body>
